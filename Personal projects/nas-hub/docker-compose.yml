services:
  nas-hub:
    build: .
    container_name: nas-hub
    ports:
      - "3180:3180"
    environment:
      - BASE_URL=http://192.168.50.165:3180
      - SESSION_SECRET=change-this-secret
      - GOOGLE_CLIENT_SECRET_FILE=/app/secrets/client.json
      - GOOGLE_TOKEN_FILE=/app/secrets/token.json
      - DATABASE_URL=sqlite:////app/data/app.db
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets
    restart: unless-stopped
