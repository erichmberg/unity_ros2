<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NAS Calendar + Thesis Hub</title>
  <style>
    :root {
      --bg: #0c0c0d;
      --panel: #111214;
      --text: #eceef2;
      --muted: #a3a8b3;
      --line: #2b2e35;
      --hour-col: 72px;
      --hour-height: 56px;
      --day-min-width: 150px;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body { margin: 0; font-family: Inter, Segoe UI, system-ui, sans-serif; background: linear-gradient(180deg, #070708 0%, #151618 100%); color: var(--text); background-attachment: fixed; }
    .wrap { max-width: 1400px; margin: 16px auto 32px; padding: 0 14px; }
    h1 { margin: 0; font-size: 28px; }
    h2 { margin: 0 0 10px; font-size: 18px; }

    .topbar { display:flex; justify-content:space-between; align-items:center; margin: 0 0 10px; gap:10px; }
    .theme-toggle { width:auto; padding:8px 12px; }
    .plus-btn { width:auto; padding:8px 12px; font-size:18px; line-height:1; }
    .tabs { display:flex; gap:8px; margin: 0 0 10px; }
    .tab-btn { width:auto; padding:7px 12px; }
    .tab-btn.active { border-color:#5a6174; background:#2a2e36; color:#fff; }
    body[data-theme="light"] .tab-btn.active { border-color:#9fb2e6; background:#dfe9ff; color:#1f2a44; }

    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 10px 24px rgba(0,0,0,.28); }
    .grid-2 { display: grid; grid-template-columns: 1.2fr .8fr; gap: 12px; }
    .grid-2b { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 980px){ .grid-2, .grid-2b { grid-template-columns: 1fr; } }

    input, textarea, select, button {
      width: 100%; border: 1px solid #31343c; background: #121315; color: var(--text);
      border-radius: 8px; padding: 9px 10px; margin: 6px 0; font-size: 14px;
    }
    button { cursor: pointer; background: #1a1c21; color:#e6e8ec; font-weight: 600; }
    button:hover { filter: brightness(1.08); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-row button { width: auto; }
    .small { color: var(--muted); font-size: 13px; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,10,14,.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 80;
      backdrop-filter: blur(1px);
    }
    .loading-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      box-shadow: 0 10px 28px rgba(0,0,0,.35);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .week-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
    .week-wrap { border: 1px solid var(--line); border-radius: 10px; overflow: auto; background: var(--bg); }
    .week-grid { min-width: 1050px; }

    .week-header { display: grid; grid-template-columns: var(--hour-col) repeat(7, minmax(var(--day-min-width), 1fr)); }
    .week-header .cell {
      border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
      background: #141519; text-align: center; padding: 8px 6px; color: var(--muted); font-size: 12px;
    }
    .week-header .cell b { display:block; color: var(--text); font-size: 14px; text-transform: capitalize; }

    .week-body { display: grid; grid-template-columns: var(--hour-col) repeat(7, minmax(var(--day-min-width), 1fr)); }
    .hour-rail {
      position: relative;
      border-right: 1px solid var(--line);
      background: var(--bg);
      display: grid;
    }
    .hour-mark {
      color: #c0c6d3;
      font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 2px 6px;
      text-align: right;
      line-height: calc(var(--hour-height) - 4px);
      height: var(--hour-height);
      font-weight: 600;
      position: relative;
    }

    .now-time-chip {
      position: absolute;
      right: 6px; /* anchor near right side of hour rail */
      transform: translateY(-46%);
      background: #ff5f5f;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 6px;
      z-index: 40;
      display: none;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    .now-time-chip::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      width: 8px;
      height: 2px;
      background: #ff5f5f;
      transform: translateY(-50%);
    }

    .now-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #ff5f5f;
      z-index: 30;
      pointer-events: none;
      display: none;
    }

    .day-track {
      position: relative;
      border-right: 1px solid var(--line);
      background:
        repeating-linear-gradient(to bottom,
          rgba(255,255,255,0.06) 0,
          rgba(255,255,255,0.06) 1px,
          transparent 1px,
          transparent var(--hour-height)
        );
    }

    .event-seg {
      position: absolute;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.20);
      padding: 5px 6px;
      overflow: visible;
      box-shadow: 0 8px 16px rgba(6,10,24,.35);
      font-size: 12px;
      line-height: 1.2;
    }
    .resize-handle {
      position: absolute;
      width: 16px; height: 16px; border-radius: 50%;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(0,0,0,.35);
      opacity: 0;
      transition: opacity .12s ease;
      cursor: ns-resize;
      z-index: 3;
      pointer-events: auto;
    }
    /* Outside edge but shifted slightly toward center */
    .resize-handle.top { top: -10px; left: 18%; }
    .resize-handle.bottom { bottom: -10px; right: 18%; }
    .event-seg:hover .resize-handle { opacity: 1; }
    .drag-create {
      position: absolute;
      left: 6px;
      right: 6px;
      border-radius: 8px;
      border: 1px dashed rgba(255,255,255,.55);
      background: rgba(120,140,180,.18);
      pointer-events: none;
      z-index: 25;
    }
    .event-title { font-weight: 700; color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,.4); overflow-wrap: anywhere; word-break: break-word; }
    .event-meta { font-size: 11px; color: rgba(255,255,255,.92); margin-top: 2px; text-shadow: 0 1px 2px rgba(0,0,0,.35); }

    .pill { display:inline-block; margin:3px 6px 0 0; padding:3px 8px; border-radius:999px; background:#141519; border:1px solid #34363e; font-size:12px; }

    pre { background:#10152a; border:1px solid var(--line); border-radius:8px; padding:8px; color:#b8c8ef; }

    .thesis-timeline-day { margin-bottom: 12px; }
    .thesis-day-label { font-weight: 700; color: #ffb3b3; margin-bottom: 6px; }
    .thesis-track-wrap { display: grid; grid-template-columns: 52px 1fr; gap: 8px; }
    .thesis-hour-rail {
      position: relative;
      border-right: 1px solid #6a1a1a;
      color: #d9a3a3;
      font-size: 11px;
    }
    .thesis-week-wrap { margin-top: 4px; }
    .thesis-week-header {
      display: grid;
      gap: 6px;
      margin-bottom: 6px;
    }
    .thesis-week-header-cell {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #ffb3b3;
      border: 1px solid #5f1717;
      border-radius: 6px;
      padding: 4px;
      background: #240909;
    }
    .thesis-week-body {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 8px;
    }
    .thesis-days-grid {
      display: grid;
      gap: 6px;
    }
    .thesis-hour-mark {
      position: absolute;
      right: 6px;
      transform: translateY(-50%);
      opacity: .9;
    }
    .thesis-day-track {
      position: relative;
      border: 1px solid #7a1111;
      border-radius: 8px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 86, 86, 0.15) 0,
        rgba(255, 86, 86, 0.15) 1px,
        transparent 1px,
        transparent var(--thesis-hour-h)
      );
      overflow: hidden;
    }
    .thesis-event-block {
      position: absolute;
      left: 6px;
      right: 6px;
      border-radius: 8px;
      border: 1px solid #d64a4a;
      background: linear-gradient(180deg, #b21f1f 0%, #7f1010 70%, #5a0b0b 100%);
      color: #fff;
      padding: 4px 6px;
      font-size: 12px;
      line-height: 1.2;
      box-shadow: 0 4px 10px rgba(0,0,0,.35);
    }

    .thesis-summary-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .thesis-metric { border:1px solid #3a3a3a; background:#141414; border-radius:8px; padding:8px; }
    .thesis-metric .k { font-size:11px; color:#b5b5b5; }
    .thesis-metric .v { font-size:18px; font-weight:800; color:#f1f1f1; margin-top:2px; }
    .thesis-list-box { margin-top:8px; border:1px solid #343434; background:#121212; border-radius:8px; padding:8px; }
    .thesis-list-box b { color:#e6e6e6; }
    .thesis-list-box ul { margin:6px 0 0 16px; padding:0; color:#cfcfcf; }

    body[data-theme="light"] .thesis-metric { border-color:#d8d8d8; background:#ffffff; }
    body[data-theme="light"] .thesis-metric .k { color:#666; }
    body[data-theme="light"] .thesis-metric .v { color:#111; }
    body[data-theme="light"] .thesis-list-box { border-color:#d8d8d8; background:#ffffff; }
    body[data-theme="light"] .thesis-list-box b,
    body[data-theme="light"] .thesis-list-box ul { color:#222; }
    body[data-theme="light"] #thesisScheduleWindow { background:#fff5f5 !important; border-color:#d99 !important; }
    body[data-theme="light"] .thesis-hour-rail { border-right-color:#d3a0a0; color:#7a5050; }
    body[data-theme="light"] .thesis-day-track { border-color:#d99; background: repeating-linear-gradient(to bottom, rgba(200,80,80,0.15) 0, rgba(200,80,80,0.15) 1px, transparent 1px, transparent var(--thesis-hour-h)); }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none;
      align-items: center; justify-content: center; z-index: 50;
    }
    .modal {
      width: min(560px, 94vw); background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 12px;
    }
    .modal h3 { margin: 0 0 8px; }
    .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .icon-btn { width:auto; padding:6px 10px; }
    .danger-text-btn {
      width: auto;
      background: transparent !important;
      border: none !important;
      color: #ff6b6b !important;
      padding: 6px 2px;
      font-weight: 700;
    }
    .danger-text-btn:hover { color: #ff4f4f !important; text-decoration: underline; }
    .view-field { margin: 6px 0; padding: 8px; border:1px solid var(--line); border-radius:8px; background: rgba(255,255,255,0.02); }
    .hidden { display:none !important; }

    .hover-tip {
      position: fixed; z-index: 60; pointer-events: none;
      max-width: 320px; padding: 8px 10px; border-radius: 8px;
      background: rgba(16,18,22,.95); color:#f4f6fb; border:1px solid #3b3f4b;
      font-size: 12px; line-height: 1.3; display:none;
      box-shadow: 0 8px 22px rgba(0,0,0,.35);
    }

    /* Light theme overrides */
    body[data-theme="light"] {
      --bg: #f7f8fc;
      --panel: #ffffff;
      --text: #1f2a44;
      --muted: #6e7a99;
      --line: #dbe2f1;
      background: var(--bg);
    }
    body[data-theme="light"] .card { box-shadow: 0 6px 18px rgba(22,37,74,.06); }
    body[data-theme="light"] input,
    body[data-theme="light"] textarea,
    body[data-theme="light"] select,
    body[data-theme="light"] button { border-color:#ccd8ef; background:#fdfdff; color:#1f2a44; }
    body[data-theme="light"] button { background:#e9efff; color:#28407c; }
    body[data-theme="light"] .week-wrap { background:#fdfefe; }
    body[data-theme="light"] .week-header .cell { background:#f2f5ff; }
    body[data-theme="light"] .hour-rail { background:#f8faff; }
    body[data-theme="light"] .day-track {
      background: repeating-linear-gradient(to bottom, rgba(130,150,210,0.18) 0, rgba(130,150,210,0.18) 1px, transparent 1px, transparent var(--hour-height));
    }
    body[data-theme="light"] .event-title,
    body[data-theme="light"] .event-meta { color:#111827; text-shadow:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Calendar + Thesis Hub</h1>
      <div class="btn-row">
        <button id="quickAddBtn" class="plus-btn" type="button" onclick="openCreateModal()">＋</button>
        <button id="themeToggle" class="theme-toggle" type="button">Switch to Light</button>
      </div>
    </div>

    <div class="tabs">
      <button id="tabBtnCalendar" class="tab-btn active" type="button" onclick="switchTab('calendar')">Calendar</button>
      <button id="tabBtnThesis" class="tab-btn" type="button" onclick="switchTab('thesis')">Candidate thesis</button>
    </div>

    <div id="tabCalendar">
    <div class="grid-2">
      <div class="card">
        <div class="week-head">
          <h2>Weekly calendar (Monday start, 24h)</h2>
          <div class="btn-row">
            <button onclick="shiftWeek(-7)">← Previous</button>
            <button onclick="goToCurrentWeek()">Today</button>
            <button onclick="shiftWeek(7)">Next →</button>
            <button onclick="loadWeek()">Refresh</button>
          </div>
        </div>
        <div id="weekLabel" class="small"></div>

        <div class="week-wrap" style="margin-top:8px;">
          <div id="weekGrid" class="week-grid"></div>
        </div>

        <div style="margin-top:10px;">
          <h2 style="font-size:16px; margin-bottom:6px;">Calendars</h2>
          <div id="calendarPills"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>Controls</h2>
          <p class="small">Use <b>＋</b> (top-right) to add events, or drag on the calendar to create quickly.</p>
          <div id="status" class="small">Loading…</div>
        </div>
      </div>
    </div>
    </div>

    <div id="eventModalBackdrop" class="modal-backdrop" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <h3 style="margin:0;">Event details</h3>
          <button id="mGearBtn" class="icon-btn" type="button" onclick="toggleEditMode()">⚙️ Edit</button>
        </div>

        <div id="mViewMode">
          <div class="view-field"><b id="mViewTitle"></b></div>
          <div class="view-field" id="mViewTime"></div>
          <div class="view-field" id="mViewDesc"></div>
          <div id="mInfo" class="small"></div>
          <div style="margin-top:8px;">
            <button type="button" class="danger-text-btn" onclick="deleteModalEvent()">Delete event</button>
          </div>
        </div>

        <div id="mEditMode" class="hidden">
          <input id="mTitle" type="text" placeholder="Title" />
          <textarea id="mDesc" rows="3" placeholder="Description"></textarea>
          <label>Date</label>
          <input id="mDate" type="date" lang="sv-SE" />
          <label>Start (24h)</label>
          <input id="mStartTime" type="text" placeholder="HH:MM" inputmode="numeric" pattern="^([01]\d|2[0-3]):[0-5]\d$" />
          <label>End (24h)</label>
          <input id="mEndTime" type="text" placeholder="HH:MM" inputmode="numeric" pattern="^([01]\d|2[0-3]):[0-5]\d$" />
          <label>Recurrence</label>
          <select id="mRecurrence">
            <option value="">Does not repeat</option>
            <option value="RRULE:FREQ=WEEKLY">Repeats weekly</option>
          </select>
          <div class="btn-row">
            <button type="button" onclick="saveModalEvent()">Save changes</button>
            <button type="button" class="danger-text-btn" onclick="deleteModalEvent()">Delete event</button>
          </div>
        </div>
      </div>
    </div>

    <div id="createModalBackdrop" class="modal-backdrop" onclick="closeCreateModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <h3 style="margin:0;">Create event</h3>
        </div>
        <label>Calendar</label>
        <select id="cCalendar"></select>
        <label>Title</label>
        <input id="cTitle" type="text" placeholder="Event title" />
        <label>Description</label>
        <textarea id="cDesc" rows="3" placeholder="Description"></textarea>
        <label>Date</label>
        <input id="cDate" type="date" lang="sv-SE" />
        <label>Start (24h)</label>
        <input id="cStartTime" type="text" placeholder="HH:MM" inputmode="numeric" pattern="^([01]\d|2[0-3]):[0-5]\d$" />
        <label>End (24h)</label>
        <input id="cEndTime" type="text" placeholder="HH:MM" inputmode="numeric" pattern="^([01]\d|2[0-3]):[0-5]\d$" />
        <label>Recurrence</label>
        <select id="cRecurrence">
          <option value="">Does not repeat</option>
          <option value="RRULE:FREQ=WEEKLY">Repeats weekly</option>
        </select>
        <div class="btn-row">
          <button type="button" onclick="saveCreateModalEvent()">Create event</button>
          <button type="button" onclick="closeCreateModal()">Cancel</button>
        </div>
      </div>
    </div>

    <div id="hoverTip" class="hover-tip"></div>

    <div id="tabThesis" class="hidden">
    <div class="grid-2b">
      <div class="card">
        <h2>Add thesis log</h2>
        <form method="post" action="/api/thesis-log" onsubmit="return submitThesisLogForm(event)">
          <label>Date</label>
          <input id="thDate" type="date" required>
          <label>Start (24h)</label>
          <input id="thTime" type="text" placeholder="HH:MM" inputmode="numeric" pattern="^([01]\d|2[0-3]):[0-5]\d$" required>
          <input id="thStartedAt" type="hidden" name="started_at">
          <label>Hours</label>
          <input type="number" step="0.25" name="hours" required>
          <label>Summary</label>
          <input type="text" name="summary" required>

          <label>Task type (primary)</label>
          <select name="task_type">
            <option value="">(optional)</option>
            <option value="coding">Coding</option>
            <option value="reading">Reading</option>
            <option value="experiment">Experiment</option>
            <option value="writing">Writing</option>
            <option value="meeting">Meeting</option>
            <option value="planning">Planning</option>
          </select>
          <label>Extra categories (comma separated)</label>
          <input type="text" name="category_tags" placeholder="coding,meeting,planning">
          <label>Outcome</label>
          <input type="text" name="outcome" placeholder="What moved forward?">
          <label>Blocker</label>
          <input type="text" name="blocker" placeholder="What got stuck?">
          <label>Next action</label>
          <input type="text" name="next_action" placeholder="Clear next step">

          <button type="submit">Save log</button>
        </form>
      </div>
      <div class="card">
        <h2>Thesis summary</h2>
        <div class="btn-row" style="align-items:center; gap:8px; flex-wrap:wrap;">
          <button type="button" onclick="shiftThesisWindow(-7)">← Prev week</button>
          <button type="button" onclick="shiftThesisWindow(7)">Next week →</button>
          <button type="button" onclick="undoLastThesisAction()">Undo last</button>
          <button type="button" onclick="exportThesisCsv()">Export CSV</button>
          <label for="thesisRangeDays" style="margin:0 0 0 8px; font-size:12px; opacity:.9;">Range</label>
          <select id="thesisRangeDays" onchange="loadThesisSummary(Number(this.value))" style="max-width:180px;">
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
          </select>
        </div>
        <div id="thesisInsight" class="thesis-list-box" style="margin-top:10px;"></div>
        <div id="thesisScheduleWindow" style="margin-top:10px; border:1px solid #7a1111; background:#160404; border-radius:10px; min-height:180px; padding:10px;"></div>
        <div id="thesisSummary" style="margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <div id="thesisLogModalBackdrop" class="modal-backdrop" onclick="closeThesisLogModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 style="margin-top:0;">Edit thesis log</h3>
      <input id="tlId" type="hidden" />
      <label>Date</label>
      <input id="tlDate" type="date" />
      <label>Start (24h)</label>
      <input id="tlTime" type="text" placeholder="HH:MM" inputmode="numeric" pattern="^([01]\d|2[0-3]):[0-5]\d$" />
      <label>Hours</label>
      <input id="tlHours" type="number" step="0.25" />
      <label>Summary</label>
      <input id="tlSummary" type="text" />
      <label>Task type</label>
      <select id="tlTaskType">
        <option value="coding">Coding</option>
        <option value="reading">Reading</option>
        <option value="experiment">Experiment</option>
        <option value="writing">Writing</option>
        <option value="meeting">Meeting</option>
        <option value="planning">Planning</option>
        <option value="uncategorized">Uncategorized</option>
      </select>
      <label>Extra categories (comma separated)</label>
      <input id="tlCategoryTags" type="text" placeholder="coding,meeting" />
      <div class="btn-row">
        <button type="button" onclick="saveThesisLogEdit()">Save</button>
        <button type="button" class="danger-text-btn" onclick="deleteThesisLogEdit()">Delete</button>
        <button type="button" onclick="closeThesisLogModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-card"><div class="spinner"></div><div>Saving changes…</div></div>
  </div>

<script>
const DEFAULT_HOUR_START = 6;
const DEFAULT_HOUR_END = 24; // show through 00:00
const HOUR_HEIGHT = 56;
let visibleHourStart = DEFAULT_HOUR_START;
let visibleHourEnd = DEFAULT_HOUR_END;
let calendars = [];
let weekStart = getMonday(new Date());
let selectedEvent = null;

function pad(n){ return String(n).padStart(2, '0'); }
function getMonday(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function shiftWeek(days){ weekStart.setDate(weekStart.getDate()+days); loadWeek(); }
function goToCurrentWeek(){ weekStart=getMonday(new Date()); loadWeek(); }

function hashHue(str){ let h=0; for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h); return Math.abs(h)%360; }
function eventGradient(cal){
  const hue = hashHue(cal||'calendar');
  const theme = document.body.getAttribute('data-theme') || 'dark';
  if (theme === 'light') {
    // Light mode: darker text support with soft pastel block
    return `linear-gradient(180deg, hsla(${hue},70%,78%,0.95) 0%, hsla(${hue},72%,84%,0.72) 58%, hsla(${hue},74%,90%,0.28) 100%)`;
  }
  // Dark mode: near-black to dark gray style with subtle calendar tint
  return `linear-gradient(180deg, hsla(${hue},28%,9%,0.96) 0%, hsla(${hue},24%,16%,0.82) 55%, hsla(${hue},36%,28%,0.35) 100%)`;
}

function hyphenateLongWords(text, chunk=12){
  if (!text) return '';
  return text.split(/(\s+)/).map(part => {
    if (!part.trim() || part.length <= chunk) return part;
    const pieces = part.match(new RegExp(`.{1,${chunk}}`, 'g')) || [part];
    return pieces.join('-\u200b');
  }).join('');
}

async function loadCalendars(){
  const r = await fetch('/api/calendars');
  if (!r.ok) throw new Error(`Calendars API failed (${r.status})`);
  const j = await r.json();
  calendars = j.items || [];

  const sel = document.getElementById('cCalendar');
  if (sel){
    sel.innerHTML='';
    for(const c of calendars){
      const o=document.createElement('option');
      o.value=c.id;
      o.textContent=c.summary;
      sel.appendChild(o);
    }
  }

  const pills = document.getElementById('calendarPills');
  pills.innerHTML='';
  for(const c of calendars){
    const p=document.createElement('span'); p.className='pill';
    p.style.borderColor=`hsl(${hashHue(c.summary)},80%,60%)`;
    p.textContent=c.summary;
    pills.appendChild(p);
  }
}

function roundToQuarter(mins){
  return Math.round(mins / 15) * 15;
}

function minutesToInput(dayDate, mins){
  const d = new Date(dayDate);
  d.setHours(0,0,0,0);
  d.setMinutes(mins);
  return toLocalInputValue(d.toISOString());
}

function dayDateFromIndex(dayIdx){
  const d = new Date(weekStart);
  d.setDate(d.getDate() + dayIdx);
  d.setHours(0,0,0,0);
  return d;
}

async function moveEventTo(ev, dayIdx, startMin){
  const sInput = minutesToInput(dayDateFromIndex(dayIdx), startMin);
  const eInput = minutesToInput(dayDateFromIndex(dayIdx), startMin + (ev._durationMin || 60));

  let applySeries = false;
  if (ev?.recurringEventId) {
    applySeries = confirm('Apply move to the whole recurring series?\n\nOK = whole series\nCancel = only this event');
  }

  const payload = {
    summary: ev.summary || '(no title)',
    description: ev.description || '',
    start: `${sInput}:00`,
    end: `${eInput}:00`,
    timeZone: 'Europe/Stockholm',
    applySeries,
    seriesEventId: ev?.recurringEventId || null,
  };
  const r = await fetch(`/api/events/${encodeURIComponent(ev.calendarId)}/${encodeURIComponent(ev.id)}`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.detail || 'Move failed');
}

    document.getElementById('cStartTime').value = s.time;

function buildWeekScaffold(){
  const totalHours = visibleHourEnd - visibleHourStart;
  const totalHeight = totalHours * HOUR_HEIGHT;

  const grid = document.getElementById('weekGrid');
  grid.innerHTML='';

  const header = document.createElement('div');
  header.className='week-header';
  const timeHead = document.createElement('div');
  timeHead.className='cell'; timeHead.textContent='Time';
  header.appendChild(timeHead);
  for(let i=0;i<7;i++){
    const d=new Date(weekStart); d.setDate(d.getDate()+i);
    const c=document.createElement('div'); c.className='cell';
    c.innerHTML=`<b>${d.toLocaleDateString('sv-SE',{weekday:'long'})}</b>${d.toLocaleDateString('sv-SE',{day:'2-digit',month:'2-digit'})}`;
    header.appendChild(c);
  }
  grid.appendChild(header);

  const body = document.createElement('div');
  body.className='week-body';

  const hourRail = document.createElement('div');
  hourRail.className='hour-rail';
  hourRail.style.height = `${totalHeight}px`;
  hourRail.style.gridTemplateRows = `repeat(${totalHours}, var(--hour-height))`;
  for(let h=visibleHourStart; h<visibleHourEnd; h++){
    const m=document.createElement('div');
    m.className='hour-mark';
    m.textContent=`${pad(h)}:00`;
    hourRail.appendChild(m);
  }
  const chip = document.createElement('div');
  chip.id = 'nowTimeChip';
  chip.className = 'now-time-chip';
  hourRail.appendChild(chip);
  body.appendChild(hourRail);

  for(let i=0;i<7;i++){
    const d=document.createElement('div');
    d.className='day-track';
    d.dataset.day=String(i);
    d.style.height = `${totalHeight}px`;

    for(let h=0; h<totalHours; h++){
      const line = document.createElement('div');
      line.style.position = 'absolute';
      line.style.left = '0';
      line.style.right = '0';
      line.style.top = `${h * HOUR_HEIGHT}px`;
      line.style.height = '1px';
      line.style.background = 'rgba(255,255,255,0.07)';
      d.appendChild(line);
    }

    const nowLine = document.createElement('div');
    nowLine.className = 'now-line';
    d.appendChild(nowLine);

    d.addEventListener('mousedown', (ev) => {
      if (ev.button !== 0) return;
      if (ev.target.closest('.event-seg')) return; // existing event has its own handler
      pressState = {
        kind: 'create',
        day: i,
        track: d,
        startClientY: ev.clientY,
        startClientX: ev.clientX,
        lastClientX: ev.clientX,
        lastClientY: ev.clientY,
        movedPx: 0,
        pressedAt: Date.now(),
        started: false,
        timer: setTimeout(startPressDrag, PRESS_TO_DRAG_MS),
      };
      ev.preventDefault();
    });

    body.appendChild(d);
  }
  grid.appendChild(body);
}

function toLocalDate(x){ return new Date(x); }

function layoutDayEvents(dayEvents){
  // Single continuous block per event (no visual splitting), with overlap lane assignment
  const minW=visibleHourStart*60, maxW=visibleHourEnd*60;
  const items=[];

  for(const e of dayEvents){
    if(!e.start?.dateTime) continue;
    const s=toLocalDate(e.start.dateTime);
    const en=e.end?.dateTime?toLocalDate(e.end.dateTime):new Date(s.getTime()+3600000);
    let a=s.getHours()*60+s.getMinutes();
    let b=en.getHours()*60+en.getMinutes();
    if(b<=minW||a>=maxW) continue;
    a=Math.max(a,minW); b=Math.min(b,maxW);
    items.push({
      id:e.id||(`${e.summary}-${a}-${b}`),
      summary:e.summary||'(no title)',
      cal:e.calendar,
      startMin:a,
      endMin:b,
      col:0,
      cols:1,
      _group:0,
    });
  }

  items.sort((x,y)=>x.startMin-y.startMin || x.endMin-y.endMin);

  // Build overlap groups (connected components by time overlap chain)
  let groupIdx=-1;
  let groupEnd=-1;
  for(const ev of items){
    if(groupIdx===-1 || ev.startMin >= groupEnd){
      groupIdx += 1;
      groupEnd = ev.endMin;
    } else {
      groupEnd = Math.max(groupEnd, ev.endMin);
    }
    ev._group = groupIdx;
  }

  // Assign columns within each group
  const groups = new Map();
  for(const ev of items){
    if(!groups.has(ev._group)) groups.set(ev._group, []);
    groups.get(ev._group).push(ev);
  }

  for(const gEvents of groups.values()){
    gEvents.sort((a,b)=>a.startMin-b.startMin || a.endMin-b.endMin);
    const colEnds=[]; // latest end per column

    for(const ev of gEvents){
      let placed=false;
      for(let c=0;c<colEnds.length;c++){
        if(ev.startMin >= colEnds[c]){
          ev.col=c;
          colEnds[c]=ev.endMin;
          placed=true;
          break;
        }
      }
      if(!placed){
        ev.col=colEnds.length;
        colEnds.push(ev.endMin);
      }
    }

    const maxCols = Math.max(1, colEnds.length);
    for(const ev of gEvents) ev.cols = maxCols;
  }

  return items;
}

function renderWeekEvents(events){
  const tracks = Array.from(document.querySelectorAll('.day-track'));
  tracks.forEach(t=>t.querySelectorAll('.event-seg').forEach(e=>e.remove()));

  const byDay = Array.from({length:7}, ()=>[]);
  for(const e of events){
    const raw=e.start?.dateTime || e.start?.date;
    if(!raw) continue;
    const d=new Date(raw);
    const idx=(d.getDay()+6)%7; // monday=0
    byDay[idx].push(e);
  }

  for(let day=0; day<7; day++){
    const segs = layoutDayEvents(byDay[day]);
    const track = tracks[day];
    for(const s of segs){
      const top=((s.startMin - visibleHourStart*60)/60)*HOUR_HEIGHT;
      const height=Math.max(16, ((s.endMin-s.startMin)/60)*HOUR_HEIGHT - 2);
      const widthPct=100/s.cols;
      const leftPct=s.col*widthPct;

      const el=document.createElement('div');
      el.className='event-seg';
      el.style.top = `${top+1}px`;
      el.style.height = `${height}px`;
      el.style.left = `calc(${leftPct}% + 4px)`;
      el.style.width = `calc(${widthPct}% - 8px)`;
      el.style.background = eventGradient(s.cal);
      el.innerHTML = `<div class="resize-handle top" data-edge="top"></div><div class="event-title"></div><div class="resize-handle bottom" data-edge="bottom"></div>`;
      const titleEl = el.querySelector('.event-title');
      if (titleEl) titleEl.textContent = hyphenateLongWords(s.summary);
      // attach source event for modal / preview
      const src = byDay[day].find(x => (x.id||'') === s.id);
      if (src) {
        el.style.cursor = 'pointer';
        const st = src.start?.dateTime ? new Date(src.start.dateTime) : null;
        const en = src.end?.dateTime ? new Date(src.end.dateTime) : null;
        src._durationMin = (st && en) ? Math.max(15, Math.round((en - st) / 60000)) : 60;

        el.onmouseenter = (ev) => showHoverTip(ev, src);
        el.onmousemove = (ev) => moveHoverTip(ev);
        el.onmouseleave = () => hideHoverTip();

        // Normal click (incl. light touchpad tap) opens details.
        el.onclick = () => {
          if (suppressNextOpen || Date.now() < suppressNextOpenUntil) {
            suppressNextOpen = false;
            return;
          }
          if (!moveState) openEventModal(src);
        };

        // Hold-to-drag moves existing event OR resize from edge handles.
        el.onmousedown = (ev) => {
          if (ev.button !== 0) return;
          ev.stopPropagation();

          const handle = ev.target.closest('.resize-handle');
          if (handle) {
            suppressNextOpen = true;
            suppressNextOpenUntil = Date.now() + 900;
            const edge = handle.dataset.edge;
            const startDt = src.start?.dateTime ? new Date(src.start.dateTime) : null;
            const endDt = src.end?.dateTime ? new Date(src.end.dateTime) : null;
            if (!startDt || !endDt) return;
            const startMin = startDt.getHours()*60 + startDt.getMinutes();
            const endMin = endDt.getHours()*60 + endDt.getMinutes();
            const preview = document.createElement('div');
            preview.className = 'drag-create';
            track.appendChild(preview);
            const top = ((startMin - visibleHourStart*60)/60) * HOUR_HEIGHT;
            const h = Math.max(8, ((endMin - startMin)/60) * HOUR_HEIGHT);
            preview.style.top = `${top}px`;
            preview.style.height = `${h}px`;
            resizeState = { event: src, day, track, edge, startMin, endMin, preview };
            setStatus('Resizing… release to save');
            return;
          }

          pressState = {
            kind: 'event',
            event: src,
            day,
            track,
            startClientY: ev.clientY,
            startClientX: ev.clientX,
            lastClientX: ev.clientX,
            lastClientY: ev.clientY,
            movedPx: 0,
            pressedAt: Date.now(),
            started: false,
            timer: setTimeout(startPressDrag, PRESS_TO_DRAG_MS),
          };
        };
      }
      track.appendChild(el);
    }
  }
}

function toLocalInputValue(dtRaw){
  if (!dtRaw) return '';
  const d = new Date(dtRaw);
  const y=d.getFullYear();
  const m=pad(d.getMonth()+1);
  const day=pad(d.getDate());
  const h=pad(d.getHours());
  const mi=pad(d.getMinutes());
  return `${y}-${m}-${day}T${h}:${mi}`;
}

function splitDateTimeLocal(localDT){
  if (!localDT || !localDT.includes('T')) return {date:'', time:''};
  const [date, time] = localDT.split('T');
  return {date, time: (time || '').slice(0,5)};
}

function isHHMM(v){
  return /^([01]\d|2[0-3]):[0-5]\d$/.test((v || '').trim());
}

function combineDateAndTime(date, time){
  return `${date}T${time}:00`;
}

  const s = ev.start?.dateTime ? new Date(ev.start.dateTime).toLocaleString('sv-SE', {hour12:false}) : 'All-day';

function showHoverTip(ev, item){
  const tip = document.getElementById('hoverTip');
  const desc = (item.description || '').trim();
  const preview = desc.length > 180 ? desc.slice(0, 180) + '…' : (desc || '(No description)');
  const s = item.start?.dateTime ? new Date(item.start.dateTime).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit',hour12:false}) : 'All-day';
  const e = item.end?.dateTime ? new Date(item.end.dateTime).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit',hour12:false}) : '';
  tip.innerHTML = `<b>${item.summary || '(no title)'}</b><br>${s}${e ? '–'+e : ''}<br>${preview}`;
  tip.style.display = 'block';
  moveHoverTip(ev);
}

function moveHoverTip(ev){
  const tip = document.getElementById('hoverTip');
  if (!tip || tip.style.display !== 'block') return;
  tip.style.left = (ev.clientX + 14) + 'px';
  tip.style.top = (ev.clientY + 14) + 'px';
}

function hideHoverTip(){
  const tip = document.getElementById('hoverTip');
  if (tip) tip.style.display = 'none';
}

async function saveModalEvent(){
  if (!selectedEvent) return;
  const date = document.getElementById('mDate').value;
  const st = document.getElementById('mStartTime').value.trim();
  const en = document.getElementById('mEndTime').value.trim();
  if (!date || !isHHMM(st) || !isHHMM(en)) {
    alert('Use valid 24h time format HH:MM for start and end.');
    return;
  }

  let applySeries = false;
  if (selectedEvent?.recurringEventId) {
    applySeries = confirm('Apply these changes to the whole recurring series?\n\nOK = whole series\nCancel = only this event');
  }

  const payload = {
    summary: document.getElementById('mTitle').value.trim(),
    description: document.getElementById('mDesc').value.trim(),
    start: combineDateAndTime(date, st),
    end: combineDateAndTime(date, en),
    timeZone: 'Europe/Stockholm',
    recurrenceRule: document.getElementById('mRecurrence').value,
    applySeries,
    seriesEventId: selectedEvent?.recurringEventId || null,
  };
  showLoading('Saving event…');
  const r = await fetch(`/api/events/${encodeURIComponent(selectedEvent.calendarId)}/${encodeURIComponent(selectedEvent.id)}`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  const j = await r.json();
  if (!r.ok){ hideLoading(); alert(j.detail || 'Update failed'); return; }
  closeModal();
  await loadWeek();
  hideLoading();
}

async function deleteModalEvent(){
  if (!selectedEvent) return;
  if (!confirm('Delete this event?')) return;
  showLoading('Deleting event…');
  let applySeries = false;
  if (selectedEvent?.recurringEventId) {
    applySeries = confirm('Delete whole recurring series?\n\nOK = whole series\nCancel = only this event');
  }
  const q = new URLSearchParams();
  if (applySeries) {
    q.set('applySeries', 'true');
    if (selectedEvent?.recurringEventId) q.set('seriesEventId', selectedEvent.recurringEventId);
  }
  const r = await fetch(`/api/events/${encodeURIComponent(selectedEvent.calendarId)}/${encodeURIComponent(selectedEvent.id)}?${q.toString()}`, { method:'DELETE' });
  if (!r.ok){ hideLoading(); alert('Delete failed'); return; }
  closeModal();
  await loadWeek();
  hideLoading();
}

function minuteFromPointer(track, clientY){
  const rect = track.getBoundingClientRect();
  const y = clientY - rect.top;
  const mins = visibleHourStart*60 + (y / HOUR_HEIGHT) * 60;
  return roundToQuarter(Math.max(visibleHourStart*60, Math.min(visibleHourEnd*60, mins)));
}

function startPressDrag(){
  if (!pressState || pressState.started) return;

  // Require some intentional pointer movement before turning event press into move-drag.
  if (pressState.kind === 'event') {
    const threshold = MOVE_PIXELS_THRESHOLD_TOUCH;
    if (pressState.movedPx < threshold) {
      return; // treat as click/tap, not drag
    }
  }

  const {kind, track, day, startClientY} = pressState;
  const startMin = minuteFromPointer(track, startClientY);
  const overlay = document.createElement('div');
  overlay.className = 'drag-create';
  track.appendChild(overlay);
  pressState.started = true;

  if (kind === 'event') {
    suppressNextOpen = true;
    suppressNextOpenUntil = Date.now() + 700;
    moveState = {
      event: pressState.event,
      day,
      track,
      startMin,
      overlay,
    };
    // initialize overlay height to event duration
    const dur = pressState.event?._durationMin || 60;
    const top = ((startMin - visibleHourStart*60)/60) * HOUR_HEIGHT;
    const h = Math.max(8, (dur/60)*HOUR_HEIGHT);
    overlay.style.top = `${top}px`;
    overlay.style.height = `${h}px`;
  } else {
    dragState = { day, track, startMin, endMin: startMin, overlay };
    updateDragOverlay();
  }
}

  const th = document.getElementById('tabThesis');
  const bCal = document.getElementById('tabBtnCalendar');
  const bTh = document.getElementById('tabBtnThesis');
  const showCal = tab === 'calendar';

  th.classList.toggle('hidden', showCal);
  bCal.classList.toggle('active', showCal);
  bTh.classList.toggle('active', !showCal);
  localStorage.setItem('nasHubActiveTab', showCal ? 'calendar' : 'thesis');

  if (!showCal && !thesisAutoLoaded) {
    thesisAutoLoaded = true;
    loadThesisSummary(7);
  }
}

function updateDragOverlay(){
  if (!dragState) return;
  const a = Math.min(dragState.startMin, dragState.endMin);
  const b = Math.max(dragState.startMin, dragState.endMin);
  const top = ((a - visibleHourStart*60) / 60) * HOUR_HEIGHT;
  const height = Math.max(8, ((b - a) / 60) * HOUR_HEIGHT);
  dragState.overlay.style.top = `${top}px`;
  dragState.overlay.style.height = `${height}px`;
}

window.addEventListener('mousemove', (ev) => {
  if (resizeState) {
    const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.day-track') || resizeState.track;
    const dayIdx = Number(target.dataset.day);
    const m = minuteFromPointer(target, ev.clientY);

    if (resizeState.preview?.parentElement !== target) {
      resizeState.preview?.remove();
      target.appendChild(resizeState.preview);
    }

    resizeState.track = target;
    resizeState.day = dayIdx;
    if (resizeState.edge === 'top') {
      resizeState.startMin = Math.min(m, resizeState.endMin - 15);
    } else {
      resizeState.endMin = Math.max(m, resizeState.startMin + 15);
    }

    const top = ((resizeState.startMin - visibleHourStart*60)/60) * HOUR_HEIGHT;
    const h = Math.max(8, ((resizeState.endMin - resizeState.startMin)/60) * HOUR_HEIGHT);
    resizeState.preview.style.top = `${top}px`;
    resizeState.preview.style.height = `${h}px`;
    return;
  }

  if (pressState && !pressState.started) {
    const dx = ev.clientX - pressState.startClientX;
    const dy = ev.clientY - pressState.startClientY;
    pressState.movedPx = Math.hypot(dx, dy);
    pressState.lastClientX = ev.clientX;
    pressState.lastClientY = ev.clientY;

    if (Date.now() - pressState.pressedAt >= PRESS_TO_DRAG_MS) {
      startPressDrag();
    }
  }

  if (moveState) {
    if (!moveState.overlay || !moveState.overlay.isConnected) {
      moveState = null;
      return;
    }
    const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.day-track');
    if (target) {
      const dayIdx = Number(target.dataset.day);
      moveState.track = target;
      moveState.day = dayIdx;
      const startMin = minuteFromPointer(target, ev.clientY);
      moveState.startMin = startMin;
      const dur = moveState.event?._durationMin || 60;
      const top = ((startMin - visibleHourStart*60)/60) * HOUR_HEIGHT;
      const h = Math.max(8, (dur/60)*HOUR_HEIGHT);
      if (moveState.overlay.parentElement !== target) {
        moveState.overlay.remove();
        target.appendChild(moveState.overlay);
      }
      moveState.overlay.style.top = `${top}px`;
      moveState.overlay.style.height = `${h}px`;
    }
    return;
  }

  if (!dragState) return;
  dragState.endMin = minuteFromPointer(dragState.track, ev.clientY);
  updateDragOverlay();
});

window.addEventListener('mouseup', async () => {
  if (resizeState) {
    const snap = resizeState;
    resizeState = null;
    try {
      if (snap.preview?.isConnected) snap.preview.remove();
      let applySeries = false;
      if (snap.event?.recurringEventId) {
        applySeries = confirm('Apply resize to the whole recurring series?\n\nOK = whole series\nCancel = only this event');
      }
      const payload = {
        summary: snap.event.summary || '(no title)',
        description: snap.event.description || '',
        start: `${minutesToInput(dayDateFromIndex(snap.day), snap.startMin)}:00`,
        end: `${minutesToInput(dayDateFromIndex(snap.day), snap.endMin)}:00`,
        timeZone: 'Europe/Stockholm',
        applySeries,
        seriesEventId: snap.event?.recurringEventId || null,
      };
      showLoading('Saving resized event…');
      const r = await fetch(`/api/events/${encodeURIComponent(snap.event.calendarId)}/${encodeURIComponent(snap.event.id)}`, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.detail || 'Resize failed');
      await loadWeek();
      hideLoading();
      suppressNextOpen = true;
      suppressNextOpenUntil = Date.now() + 900;
      return;
    } catch (e) {
      if (snap.preview?.isConnected) snap.preview.remove();
      hideLoading();
      alert(e.message || 'Resize failed');
      await loadWeek();
      return;
    }
  }

  if (pressState) {
    clearTimeout(pressState.timer);
    const started = pressState.started;
    // short click path handled by onclick on event blocks; for empty cells do nothing
    pressState = null;
    if (!started) return;
  }

  if (moveState) {
    suppressNextOpen = true;
    suppressNextOpenUntil = Date.now() + 900;
    const snapshot = moveState;
    moveState = null; // prevent ghost-follow while async update runs
    try {
      const ev = snapshot.event;
      const dayIdx = snapshot.day;
      const startMin = snapshot.startMin;
      if (snapshot.overlay?.isConnected) snapshot.overlay.remove();
      showLoading('Moving event…');
      await moveEventTo(ev, dayIdx, startMin);
      await loadWeek();
      hideLoading();
      return;
    } catch (e) {
      if (snapshot.overlay?.isConnected) snapshot.overlay.remove();
      hideLoading();
      alert(e.message || 'Move failed');
      await loadWeek();
      return;
    }
  }

  if (!dragState) return;
  const a = Math.min(dragState.startMin, dragState.endMin);
  const b = Math.max(dragState.startMin, dragState.endMin);
  const span = Math.abs(b - a);
  const dayDate = new Date(weekStart);
  dayDate.setDate(dayDate.getDate() + dragState.day);

  dragState.overlay.remove();

  if (span >= DRAG_MIN_MINUTES) {
    openCreateModal({
      start: minutesToInput(dayDate, a),
      end: minutesToInput(dayDate, b),
    });
  }

  dragState = null;
});

async function loadWeek(){
  setStatus('Loading week…');
  try {
    await loadCalendars();

    const start=new Date(weekStart);
    const end=new Date(weekStart); end.setDate(end.getDate()+7);
    document.getElementById('weekLabel').textContent = `${start.toLocaleDateString('sv-SE')} → ${new Date(end.getTime()-1).toLocaleDateString('sv-SE')}`;

    const r=await fetch(`/api/events?start=${encodeURIComponent(start.toISOString())}&end=${encodeURIComponent(end.toISOString())}`);
    if (!r.ok) throw new Error(`Events API failed (${r.status})`);
    const j=await r.json();
    const items=j.items||[];

    // Default view 06:00-00:00, but if this week has earlier events, open from earliest hour.
    let earliestHour = DEFAULT_HOUR_START;
    for (const ev of items){
      if (!ev.start?.dateTime) continue;
      const h = new Date(ev.start.dateTime).getHours();
      if (h < earliestHour) earliestHour = h;
    }
    visibleHourStart = Math.max(0, Math.min(DEFAULT_HOUR_START, earliestHour));
    visibleHourEnd = DEFAULT_HOUR_END;

    buildWeekScaffold();
    renderWeekEvents(items);
    updateNowIndicator();
    setStatus(`Loaded ${items.length} events this week. Visible hours: ${pad(visibleHourStart)}:00–${pad(visibleHourEnd)}:00`);
  } catch (err) {
    console.error(err);
    setStatus(`Failed to load week: ${err.message || err}`);
  } finally {
    hideLoading();
  }
}

function updateNowIndicator(){
  const now = new Date();
  const mins = now.getHours()*60 + now.getMinutes();
  const withinWeek = now >= weekStart && now < new Date(weekStart.getTime() + 7*24*60*60*1000);
  const withinRange = mins >= visibleHourStart*60 && mins < visibleHourEnd*60;

  const top = ((mins - visibleHourStart*60)/60) * HOUR_HEIGHT;
  document.querySelectorAll('.now-line').forEach((line) => {
    if (withinWeek && withinRange) {
      line.style.display = 'block';
      line.style.top = `${top}px`;
    } else {
      line.style.display = 'none';
    }
  });

  const chip = document.getElementById('nowTimeChip');
  if (chip && withinWeek && withinRange) {
    chip.style.display = 'block';
    chip.style.top = `${top}px`;
    chip.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  } else if (chip) {
    chip.style.display = 'none';
  }
}

async function loadThesisSummary(days){
  const sel = document.getElementById('thesisRangeDays');
  if (sel) sel.value = String(days);

  const d = new Date(thesisViewEndDate);
  d.setHours(23,59,59,999);
  const start = new Date(d);
  start.setDate(start.getDate() - (Number(days)-1));
  start.setHours(0,0,0,0);

  const [sr, lr, ir] = await Promise.all([
    fetch(`/api/thesis-summary?days=${days}`),
    fetch(`/api/thesis-logs?days=3650`),
    fetch(`/api/thesis-insights?target_weekly_hours=20`),
  ]);
  const summary = await sr.json();
  const logsData = await lr.json();
  const insight = await ir.json();

  const esc = (s='') => String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');

  const byType = summary.hoursByTaskType || {};
  const typeRows = Object.entries(byType)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `<li><b>${esc(k)}</b>: ${esc(v)}h</li>`)
    .join('') || '<li>No categorized entries yet.</li>';

  const highlights = summary.weeklyHighlights || {};
  const outcomes = (highlights.outcomes || []).map(x => `<li>${esc(x)}</li>`).join('') || '<li>None</li>';
  const blockers = (highlights.blockers || []).map(x => `<li>${esc(x)}</li>`).join('') || '<li>None</li>';
  const nextActions = (highlights.nextActions || []).map(x => `<li>${esc(x)}</li>`).join('') || '<li>None</li>';

  document.getElementById('thesisSummary').innerHTML =
    `<div class="thesis-summary-grid">`+
      `<div class="thesis-metric"><div class="k">Range</div><div class="v">Last ${esc(summary.days || 0)} days</div></div>`+
      `<div class="thesis-metric"><div class="k">Entries</div><div class="v">${esc(summary.entries || 0)}</div></div>`+
      `<div class="thesis-metric"><div class="k">Hours</div><div class="v">${esc(summary.hours || 0)}h</div></div>`+
      `<div class="thesis-metric"><div class="k">Total since start</div><div class="v">${esc(summary.totalProjectHours || 0)}h</div></div>`+
    `</div>`+
    `<div class="thesis-list-box"><b>Hours by task type</b><ul>${typeRows}</ul></div>`+
    `<div class="thesis-list-box"><b>Outcomes</b><ul>${outcomes}</ul></div>`+
    `<div class="thesis-list-box"><b>Blockers</b><ul>${blockers}</ul></div>`+
    `<div class="thesis-list-box"><b>Next actions</b><ul>${nextActions}</ul></div>`;

  const insightEl = document.getElementById('thesisInsight');
  if (insightEl) insightEl.innerHTML = `<b>Weekly status</b><div style="margin-top:4px;">${esc(insight.message || '')}</div>`;

  const wrap = document.getElementById('thesisScheduleWindow');
  const allLogs = logsData.items || [];
  const logs = allLogs.filter(l => {
    const t = new Date(l.startedAt).getTime();
    return t >= start.getTime() && t <= d.getTime();
  });

  thesisLogsIndex = new Map(logs.map(x => [String(x.id), x]));

  if (!logs.length) {
    wrap.innerHTML = '<div style="color:#d8a8a8;">No thesis logs in this range.</div>';
    return;
  }

  const hourH = 24;
  const startHour = 6;
  const endHour = 24;
  const totalH = (endHour - startHour) * hourH;
  wrap.style.setProperty('--thesis-hour-h', `${hourH}px`);

  // Rolling last N days view (default 7): include weekend columns only when they have entries.
  const dayKey = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const rangeDays = Number(days) || 7;
  const startRange = new Date(start);

  const allDays = [];
  for (let i=0; i<rangeDays; i++) {
    const d = new Date(startRange);
    d.setDate(d.getDate() + i);
    allDays.push(d);
  }

  const hasLogOn = (d) => logs.some(l => {
    const x = new Date(l.startedAt);
    return x.toDateString() === d.toDateString();
  });

  const displayDays = allDays.filter(d => {
    const wd = d.getDay(); // 0 Sun, 6 Sat
    if (wd !== 0 && wd !== 6) return true;
    return hasLogOn(d);
  });

  if (!displayDays.length) {
    wrap.innerHTML = '<div style="color:#d8a8a8;">No weekday logs in this range.</div>';
    return;
  }

  const grouped = new Map();
  for (const d of displayDays) grouped.set(dayKey(d), []);
  for (const l of logs) {
    const d = new Date(l.startedAt);
    const k = dayKey(d);
    if (grouped.has(k)) grouped.get(k).push(l);
  }

  let rail = '';
  for (let h = startHour; h <= endHour; h += 2) {
    const y = (h - startHour) * hourH;
    rail += `<div class="thesis-hour-mark" style="top:${y}px;">${pad(h%24)}:00</div>`;
  }

  const colCount = displayDays.length;
  let header = '';
  let cols = '';
  for (const d of displayDays) {
    const k = dayKey(d);
    const items = grouped.get(k) || [];
    const name = d.toLocaleDateString('sv-SE', { weekday:'short' });
    const shortDate = d.toLocaleDateString('sv-SE', { month:'2-digit', day:'2-digit' });
    header += `<div class="thesis-week-header-cell">${esc(name)} ${esc(shortDate)}</div>`;

    let blocks = '';
    for (const it of items) {
      const s = new Date(it.startedAt);
      const sm = s.getHours() * 60 + s.getMinutes();
      const em = sm + Math.round((Number(it.hours) || 0) * 60);
      const top = ((sm - startHour*60) / 60) * hourH;
      const height = Math.max(16, ((em - sm) / 60) * hourH);
      const clampedTop = Math.max(0, Math.min(totalH - 16, top));
      blocks += `<div class="thesis-event-block" data-log-id="${esc(String(it.id))}" onclick="openThesisLogModal('${esc(String(it.id))}')" style="top:${clampedTop}px; height:${height}px; cursor:pointer;" title="${esc(it.summary)}">`+
                `<div style="font-weight:700; overflow-wrap:anywhere;">${esc(it.summary)}</div>`+
                `<div style="font-size:11px; opacity:.9; margin-top:2px;">${esc(String(it.hours))}h · ${esc(it.taskType || 'uncategorized')}</div>`+
                `</div>`;
    }
    cols += `<div class="thesis-day-track" style="height:${totalH}px;">${blocks}</div>`;
  }

  wrap.innerHTML = `<div class="thesis-week-wrap">`+
    `<div class="thesis-week-header" style="grid-template-columns:52px repeat(${colCount}, minmax(0,1fr));">`+
      `<div></div>${header}`+
    `</div>`+
    `<div class="thesis-week-body">`+
      `<div class="thesis-hour-rail" style="height:${totalH}px;">${rail}</div>`+
      `<div class="thesis-days-grid" style="grid-template-columns:repeat(${colCount}, minmax(0,1fr));">${cols}</div>`+
    `</div>`+
  `</div>`;
}

function shiftThesisWindow(deltaDays){
  thesisViewEndDate.setDate(thesisViewEndDate.getDate() + deltaDays);
  const days = Number(document.getElementById('thesisRangeDays')?.value || 7);
  loadThesisSummary(days);
}

async function undoLastThesisAction(){
  if (!confirm('Undo last thesis change?')) return;
  showLoading('Undoing…');
  const r = await fetch('/api/thesis-undo-last', { method:'POST' });
  if (!r.ok) { hideLoading(); alert('Nothing to undo (or undo failed).'); return; }
  await loadThesisSummary(Number(document.getElementById('thesisRangeDays')?.value || 7));
  hideLoading();
}

function exportThesisCsv(){
  const days = Number(document.getElementById('thesisRangeDays')?.value || 0);
  window.open(`/api/thesis-export.csv?days=${days}`, '_blank');
}

function toDateTimeLocal(dtRaw){
  const d = new Date(dtRaw);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function openThesisLogModal(id){
  const log = thesisLogsIndex.get(String(id));
  if (!log) return;
  const dt = splitDateTimeLocal(toDateTimeLocal(log.startedAt));
  document.getElementById('tlId').value = String(log.id);
  document.getElementById('tlDate').value = dt.date;
  document.getElementById('tlTime').value = dt.time;
  document.getElementById('tlHours').value = String(log.hours ?? '');
  document.getElementById('tlSummary').value = log.summary || '';
  document.getElementById('tlTaskType').value = log.taskType || 'uncategorized';
  document.getElementById('tlCategoryTags').value = (log.categoryTags || []).join(',');
  document.getElementById('thesisLogModalBackdrop').style.display = 'flex';
}

function closeThesisLogModal(){
  const el = document.getElementById('thesisLogModalBackdrop');
  if (el) el.style.display = 'none';
}

async function saveThesisLogEdit(){
  const id = document.getElementById('tlId').value;
  if (!id) return;
  const date = document.getElementById('tlDate').value;
  const time = document.getElementById('tlTime').value.trim();
  if (!date || !isHHMM(time)) {
    alert('Use valid 24h time format HH:MM.');
    return;
  }
  const payload = {
    startedAt: combineDateAndTime(date, time),
    hours: Number(document.getElementById('tlHours').value || 0),
    summary: document.getElementById('tlSummary').value.trim(),
    taskType: document.getElementById('tlTaskType').value,
    categoryTags: document.getElementById('tlCategoryTags').value.split(',').map(x=>x.trim()).filter(Boolean),
  };
  showLoading('Saving thesis log…');
  const r = await fetch(`/api/thesis-logs/${encodeURIComponent(id)}`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  if (!r.ok) { hideLoading(); alert('Failed to save thesis log'); return; }
  closeThesisLogModal();
  await loadThesisSummary(Number(document.getElementById('thesisRangeDays')?.value || 7));
  hideLoading();
}

async function deleteThesisLogEdit(){
  const id = document.getElementById('tlId').value;
  if (!id) return;
  if (!confirm('Delete this thesis log?')) return;
  showLoading('Deleting thesis log…');
  const r = await fetch(`/api/thesis-logs/${encodeURIComponent(id)}`, { method:'DELETE' });
  if (!r.ok) { hideLoading(); alert('Failed to delete thesis log'); return; }
  closeThesisLogModal();
  await loadThesisSummary(Number(document.getElementById('thesisRangeDays')?.value || 7));
  hideLoading();
}

function submitThesisLogForm(ev){
  const date = document.getElementById('thDate').value;
  const time = document.getElementById('thTime').value.trim();
  if (!date || !isHHMM(time)) {
    ev.preventDefault();
    alert('Use valid 24h time format HH:MM.');
    return false;
  }
  document.getElementById('thStartedAt').value = `${date}T${time}`;
  return true;
}

function applyTheme(theme){
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('nasHubTheme', theme);
  const btn = document.getElementById('themeToggle');
  btn.textContent = theme === 'dark' ? 'Switch to Light' : 'Switch to Dark';
  // Repaint event gradients/text for new theme
  if (typeof loadWeek === 'function') loadWeek();
}

function initTheme(){
  const saved = localStorage.getItem('nasHubTheme') || 'dark';
  applyTheme(saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = document.body.getAttribute('data-theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });
}

document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') {
    closeAnyModal();
  }
  if (ev.key === 'Enter') {
    const createOpen = document.getElementById('createModalBackdrop').style.display === 'flex';
    if (createOpen) {
      const tag = (ev.target?.tagName || '').toLowerCase();
      if (tag !== 'textarea') {
        ev.preventDefault();
        saveCreateModalEvent();
      }
    }
  }
});

initTheme();
const initialTab = localStorage.getItem('nasHubActiveTab') || 'calendar';
switchTab(initialTab === 'thesis' ? 'thesis' : 'calendar');
loadWeek();
setInterval(updateNowIndicator, 30 * 1000);
</script>
